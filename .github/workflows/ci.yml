name: GrantLink CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  contracts:
    name: Rust Smart Contracts Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
      - name: "Setup Rust stable toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - name: "Build Smart Contract WASM"
        run: cargo build --target wasm32-unknown-unknown --release

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
      - name: "Install Node 20 LTS"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: "Install Frontend Dependencies"
        run: npm ci || npm install
      - name: "Build Production Bundle"
        run: npm run build
        env:
          VITE_RPC_URL: "https://soroban-testnet.stellar.org"
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_GRANT_REGISTRY_CONTRACT: "CCCGR7RA7SMWKF77C6H34I7Q6QFO2N2OUA2DETSSQE5NFN3WYY4HPUWW"
          VITE_GRANT_APPLICATION_CONTRACT: "CAQKHWMBEMXXO5HESSKPT6QADNC6PLUQYSEJIIULNM35I5HIZBFHUGUR"
          VITE_GRANT_ESCROW_CONTRACT: "CARO7F4WV5576NQYYDMIEHXZLU4CWHPSGCA4GRYSTEQY677RHLHIJGSB"
          VITE_FREIGHTER_ENABLED: "true"
