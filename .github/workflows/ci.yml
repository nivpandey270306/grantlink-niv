name: GrantLink CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  STELLAR_SDK_VERSION: "22.0.1"

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Contract Build & Test (Rust)
  # ─────────────────────────────────────────
  contracts:
    name: Contract Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run GrantRegistry tests
        run: cargo test -p grant-registry --target-dir target -- --nocapture
        working-directory: ./contracts

      - name: Run GrantApplication tests
        run: cargo test -p grant-application --target-dir target -- --nocapture
        working-directory: ./contracts

      - name: Run GrantEscrow tests
        run: cargo test -p grant-escrow --target-dir target -- --nocapture
        working-directory: ./contracts

      - name: Build contract WASM binaries
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: ./contracts

      - name: Verify WASM files exist
        run: |
          ls -lh target/wasm32-unknown-unknown/release/*.wasm || echo "No WASM files found at this path"
          find . -name "*.wasm" -type f
        working-directory: ./contracts

  # ─────────────────────────────────────────
  # JOB 2: Frontend Lint, TypeCheck, Test, Build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type checking
        run: npm run typecheck
        # Fails CI if any TypeScript type error exists

      - name: Run frontend tests (Vitest)
        run: npm run test:ci
        env:
          VITE_RPC_URL: "https://soroban-testnet.stellar.org"
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_GRANT_REGISTRY_CONTRACT: "CCCGR7RA7SMWKF77C6H34I7Q6QFO2N2OUA2DETSSQE5NFN3WYY4HPUWW"
          VITE_GRANT_APPLICATION_CONTRACT: "CAQKHWMBEMXXO5HESSKPT6QADNC6PLUQYSEJIIULNM35I5HIZBFHUGUR"
          VITE_GRANT_ESCROW_CONTRACT: "CARO7F4WV5576NQYYDMIEHXZLU4CWHPSGCA4GRYSTEQY677RHLHIJGSB"
          VITE_FREIGHTER_ENABLED: "true"

      - name: Build production bundle
        run: npm run build
        env:
          VITE_RPC_URL: "https://soroban-testnet.stellar.org"
          VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          VITE_GRANT_REGISTRY_CONTRACT: "CCCGR7RA7SMWKF77C6H34I7Q6QFO2N2OUA2DETSSQE5NFN3WYY4HPUWW"
          VITE_GRANT_APPLICATION_CONTRACT: "CAQKHWMBEMXXO5HESSKPT6QADNC6PLUQYSEJIIULNM35I5HIZBFHUGUR"
          VITE_GRANT_ESCROW_CONTRACT: "CARO7F4WV5576NQYYDMIEHXZLU4CWHPSGCA4GRYSTEQY677RHLHIJGSB"
          VITE_FREIGHTER_ENABLED: "true"
        # Fails CI if TypeScript compilation or Vite build fails

      - name: Verify build output exists
        run: |
          ls -lh dist/
          ls -lh dist/assets/

  # ─────────────────────────────────────────
  # JOB 3: Deploy to Vercel (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [contracts, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          VITE_RPC_URL: ${{ secrets.VITE_RPC_URL }}
          VITE_NETWORK_PASSPHRASE: ${{ secrets.VITE_NETWORK_PASSPHRASE }}
          VITE_GRANT_REGISTRY_CONTRACT: ${{ secrets.VITE_GRANT_REGISTRY_CONTRACT }}
          VITE_GRANT_APPLICATION_CONTRACT: ${{ secrets.VITE_GRANT_APPLICATION_CONTRACT }}
          VITE_GRANT_ESCROW_CONTRACT: ${{ secrets.VITE_GRANT_ESCROW_CONTRACT }}
          VITE_FREIGHTER_ENABLED: "true"

      - name: Deploy to Vercel (Production)
        run: |
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --cwd ./dist
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
